<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks — Travis Claypool</title>
  <meta name="description" content="Thanks for reaching out to Travis Claypool.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: #1a1a1a;
    }

    .video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: #1a1a1a;
    }

    .video-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      width: 440px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
      padding: 2.5rem;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 0.75rem;
    }

    p {
      color: #333;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    p + p { margin-top: 1rem; }

    a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="video-bg" aria-hidden="true">
    <picture>
      <source srcset="/img/geophysical-integration.webp" type="image/webp">
      <img src="/img/geophysical-integration.jpg" alt="" width="1050" height="1400">
    </picture>
  </div>

  <main class="page">
    <div class="card">
      <h1>Thanks for reaching out</h1>
      <p>I'll get back to you soon.</p>
      <p><a href="/">← Back home</a></p>
    </div>
  </main>
</body>
</html>
